<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora ICMS-ST Smart</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #131314;
            --card-bg: #1e1f20;
            --text-main: #e3e3e3;
            --text-sub: #b3b3b3;
            --accent: #a8c7fa;
            --accent-bg: rgba(168, 199, 250, 0.1);
            --border: #3c4043;
            --input-bg: #131314;
            --btn-hover: #1a1a1c;
            --danger: #f28b82;
            --danger-bg: rgba(242, 139, 130, 0.15);
            --success: #81c995;
            --success-bg: rgba(129, 201, 149, 0.15);
            --warning: #fdd663;
            --warning-bg: rgba(253, 214, 99, 0.15);
        }

        [data-theme="light"] {
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --text-main: #202124;
            --text-sub: #5f6368;
            --accent: #1a73e8;
            --accent-bg: rgba(26, 115, 232, 0.1);
            --border: #dadce0;
            --input-bg: #f8f9fa;
            --btn-hover: #e8eaed;
            --danger: #d93025;
            --danger-bg: rgba(217, 48, 37, 0.1);
            --success: #137333;
            --success-bg: rgba(19, 115, 51, 0.1);
            --warning: #e37400;
            --warning-bg: rgba(227, 116, 0, 0.1);
        }

        body { font-family: 'Google Sans', sans-serif; background-color: var(--bg); color: var(--text-main); margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh; transition: 0.3s; line-height: 1.25; }
        .container { width: 100%; max-width: 900px; }

        .header { display: flex; justify-content: center; align-items: center; margin-bottom: 25px; position: relative; }
        h1 { font-size: 24px; font-weight: 500; margin: 0; background: linear-gradient(90deg, #4285f4, #9b72cb, #d96570); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .btn-theme { position: absolute; right: 0; background: var(--card-bg); border: 1px solid var(--border); color: var(--text-main); padding: 8px 16px; border-radius: 50px; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: 0.2s; font-size: 13px; font-family: inherit; font-weight: 500; }
        .btn-theme:hover { background: var(--input-bg); }

        .card { background: var(--card-bg); border-radius: 12px; padding: 20px; border: 1px solid var(--border); margin-bottom: 20px; transition: 0.3s; }

        .drop-zone { border: 2px dashed var(--border); border-radius: 10px; padding: 20px; text-align: center; margin-bottom: 20px; cursor: pointer; color: var(--text-sub); background: var(--input-bg); transition: 0.2s; }
        .drop-zone:hover, .drop-zone.dragover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }

        .grid { display: grid; grid-template-columns: 1.2fr 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .field { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 13px; color: var(--text-sub); font-weight: 500; }

        input[type="text"] { background: var(--input-bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px; color: var(--text-main); font-size: 14px; outline: none; transition: 0.2s; font-family: inherit; }
        input[type="text"]:focus { border-color: var(--accent); }

        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn-aliq { flex: 1; padding: 12px; background: transparent; border: 1px solid var(--border); border-radius: 50px; color: var(--text-main); cursor: pointer; transition: 0.2s; font-family: inherit; font-weight: 500; }
        .btn-aliq.active { background: var(--accent-bg); border-color: var(--accent); color: var(--accent); }

        .action-group { display: flex; gap: 10px; }
        .btn-main { flex: 2; padding: 14px; background: var(--accent); color: var(--bg); border: none; border-radius: 50px; font-size: 15px; font-weight: 500; cursor: pointer; transition: 0.2s; font-family: inherit; }
        .btn-main:hover { opacity: 0.9; }
        .btn-clear { flex: 1; padding: 14px; background: transparent; color: var(--text-main); border: 1px solid var(--border); border-radius: 50px; font-size: 15px; cursor: pointer; transition: 0.2s; font-family: inherit; }
        .btn-clear:hover { background: var(--input-bg); border-color: var(--danger); color: var(--danger); }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; color: var(--text-sub); font-size: 11px; padding: 10px; border-bottom: 1px solid var(--border); font-weight: 500; text-transform: uppercase; }
        td { padding: 12px 10px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: middle; }

        .st-badge { background: var(--success-bg); color: var(--success); padding: 6px 10px; border-radius: 6px; font-weight: 500; }
        .val-container { display: flex; align-items: center; gap: 8px; }

        .icon-btn { background: transparent; border: none; color: var(--text-sub); cursor: pointer; padding: 4px; border-radius: 4px; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .icon-btn:hover { background: var(--border); color: var(--text-main); }
        .icon-btn.delete:hover { background: var(--danger-bg); color: var(--danger); }

        .total-wrapper { background: var(--accent-bg); border-radius: 12px; padding: 20px; margin-top: 20px; border: 1px solid var(--border); }
        .total-linha { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .total-linha:last-child { margin-bottom: 0; }
        
        .auditoria-badge { padding: 8px 14px; border-radius: 6px; font-weight: 500; font-size: 14px; display: inline-flex; align-items: center; gap: 6px; border: 1px solid transparent; }
        .auditoria-badge.credito { background: var(--warning-bg); color: var(--warning); border-color: rgba(253, 214, 99, 0.2); }
        .auditoria-badge.recolher { background: var(--danger-bg); color: var(--danger); border-color: rgba(242, 139, 130, 0.2); }

        .total-box { font-size: 24px; color: var(--accent); font-weight: 500; text-align: right; }
        
        svg { fill: currentColor; width: 16px; height: 16px; }
        .isento-txt { color: var(--text-sub); font-style: italic; }

        /* NOVO DESIGN DO BUSCADOR NCM TIPO GEMINI - ULTRA MINIMALISTA */
        .ncm-search-box { display: flex; gap: 8px; margin-bottom: 12px; }
        .ncm-search-box input { flex: 1; }
        .ncm-mini-result { font-size: 12px; border-top: 1px solid var(--border); margin-top: 12px; padding-top: 12px; display: none; }
        .ncm-title-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .ncm-title-row h3 { margin: 0; font-size: 15px; font-weight: 500; color: var(--accent); }
        .ncm-desc { color: var(--text-sub); margin-bottom: 10px; font-size: 12px; }
        .ncm-mini-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
        .ncm-mini-box { background: var(--input-bg); border: 1px solid var(--border); padding: 6px; border-radius: 6px; text-align: center; }
        .ncm-mini-label { font-size: 9px; color: var(--text-sub); display: block; margin-bottom: 2px; text-transform: uppercase; font-weight: 500; }
        .ncm-mini-val { font-size: 13px; font-weight: 700; color: var(--text-main); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Calculadora de ICMS-ST Smart</h1>
        <button class="btn-theme" onclick="toggleTema()" id="btnTema">Claro</button>
    </div>

    <div class="card" style="padding: 14px;">
        <label style="display:block; margin-bottom: 6px;">Consultar Base de NCM (MT)</label>
        <div class="ncm-search-box">
            <input type="text" id="busca-ncm-input" placeholder="Digite o NCM para checar MVAs e Segmento..." onkeyup="if(event.key === 'Enter') consultarNcmRapido()">
            <button class="btn-main" style="flex:none; padding: 0 16px; border-radius: 8px;" onclick="consultarNcmRapido()">Buscar</button>
        </div>
        <div id="busca-ncm-resultado" class="ncm-mini-result"></div>
    </div>
    
    <div class="card">
        <div id="drop-zone" class="drop-zone">
            <svg style="width: 28px; height: 28px; margin-bottom: 6px; color: var(--text-sub);" viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zM6 20V4h7v5h5v11H6z"/></svg>
            <p style="margin: 0; font-weight: 500; font-size: 14px;">Arraste o arquivo XML da NF-e aqui</p>
            <p style="margin: 2px 0 0 0; font-size: 11px; opacity: 0.8;">Ou clique para buscar no computador</p>
            <input type="file" id="xml-input" accept=".xml" style="display: none;">
        </div>

        <div style="text-align: center; color: var(--text-sub); font-size: 11px; margin-bottom: 15px; letter-spacing: 0.5px;">— OU PREENCHA MANUALMENTE —</div>

        <div class="grid">
            <div class="field"><label>NCM</label><input type="text" id="ncm" placeholder="Clique para colar"></div>
            <div class="field"><label>Valor Produtos</label><input type="text" id="vlr" placeholder="Clique para colar"></div>
            <div class="field"><label>Valor IPI</label><input type="text" id="ipi" placeholder="Clique para colar"></div>
        </div>

        <div class="field" style="margin-bottom: 20px;">
            <label>Alíquota Interestadual (Lançamento Manual)</label>
            <div class="btn-group" style="margin-bottom: 0; margin-top: 8px;">
                <button class="btn-aliq active" id="a4" onclick="setAliq(0.04)">4%</button>
                <button class="btn-aliq" id="a7" onclick="setAliq(0.07)">7%</button>
            </div>
        </div>

        <div class="action-group">
            <button class="btn-main" onclick="processarManual()">Calcular Manual</button>
            <button class="btn-clear" onclick="limparTudo()">Limpar Tudo</button>
        </div>
    </div>

    <div id="resCard" class="card" style="display:none;">
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>NCM</th>
                        <th>MVA</th>
                        <th>PRODUTOS</th>
                        <th>BASE ST</th>
                        <th>ICMS ST</th>
                        <th style="text-align:center;">AÇÃO</th>
                    </tr>
                </thead>
                <tbody id="corpoTabela"></tbody>
            </table>
        </div>
        
        <div class="total-wrapper">
            <div class="total-linha">
                <div style="display: flex; flex-direction: column; gap: 5px;">
                    <label style="font-weight: 500; color: var(--text-main);">ST Destacado na Nota Fiscal (R$):</label>
                    <input type="text" id="vlrStNota" placeholder="0,00" onkeyup="verificarAuditoriaST()" style="width: 160px; padding: 8px; font-size: 14px;">
                </div>
                
                <div style="text-align: right;">
                    <div style="font-size: 13px; color: var(--text-sub); margin-bottom: 3px;">Total Calculado:</div>
                    <div class="total-box" id="totalSt">R$ 0,00</div>
                </div>
            </div>
            
            <div class="total-linha" id="boxCredito" style="display: none; justify-content: flex-end; margin-top: 10px;">
                <div class="auditoria-badge" id="txtCredito"></div>
            </div>
        </div>
    </div>
</div>

<script>
    let dbNcm = {};
    let aliqAtiva = 0.04;
    let historico = [];
    let totalCalculadoGlobal = 0;

    const svgCopy = `<svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>`;
    const svgDel = `<svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>`;
    const svgCheck = `<svg viewBox="0 0 24 24" fill="var(--success)"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>`;

    function parseFatorPercentual(str) {
        if(!str) return 0;
        let limpo = str.replace(/"/g, '').replace('%', '').trim();
        if(limpo === '-' || limpo === 'D/C' || limpo === 'NT' || limpo.includes('#REF')) return 0;
        let v = parseFloat(limpo.replace(',', '.'));
        if(isNaN(v)) return 0;
        if(v > 1) return v / 100; // Converte "63.28" ou "41.17" em fator decimal
        return v;
    }

    window.onload = function() {
        // Leitura otimizada do CSV separado por ponto e vírgula corporativo
        fetch('BASE NCM.csv').then(r => r.text()).then(txt => {
            txt.split(/\r?\n/).forEach((linha, i) => {
                if(i === 0 || !linha.trim()) return;
                const col = linha.split(';');
                if(col.length < 9) return;
                
                const ncmChave = col[0].replace(/"/g, '').trim();
                dbNcm[ncmChave] = {
                    cest: col[1]?.replace(/"/g, '').trim() || '---',
                    red: parseFatorPercentual(col[3]),
                    leg: col[4]?.replace(/"/g, '').trim() || '---',
                    classificacao: col[5]?.replace(/"/g, '').trim() || 'Não informada',
                    mvaOutorgado: col[6]?.replace(/"/g, '').trim() || '-',
                    mvaAtacadista: col[7]?.replace(/"/g, '').trim() || '-',
                    mvaDemais: col[8]?.replace(/"/g, '').trim() || '-',
                    mvaCalculo: parseFatorPercentual(col[8]) // Coluna I para a conta
                };
            });
        }).catch(e => console.log("Aguardando arquivo CSV..."));

        ['ncm', 'vlr', 'ipi'].forEach(id => {
            const el = document.getElementById(id);
            el.onclick = async function() {
                if (navigator.clipboard && navigator.clipboard.readText) {
                    try { distribuirValores(await navigator.clipboard.readText()); } catch (err) {}
                }
            };
            el.onpaste = function(e) {
                distribuirValores(e.clipboardData.getData('text'));
                e.preventDefault();
            };
        });
    };

    function consultarNcmRapido() {
        const query = document.getElementById('busca-ncm-input').value.trim();
        const box = document.getElementById('busca-ncm-resultado');
        if(!query) { box.style.display = 'none'; return; }

        const info = dbNcm[query];
        if(info) {
            box.innerHTML = `
                <div class="ncm-title-row">
                    <h3>NCM ${query} <span class="ncm-cest-mini">CEST ${info.cest}</span></h3>
                    <span class="uf-badge">MT</span>
                </div>
                <div class="ncm-desc"><strong>Segmento:</strong> ${info.classificacao} | <strong>Legislação:</strong> ${info.leg}</div>
                <div class="ncm-mini-grid">
                    <div class="ncm-mini-box"><span class="ncm-mini-label">Redução BC</span><span class="ncm-mini-val">${(info.red*100).toFixed(2)}%</span></div>
                    <div class="ncm-mini-box"><span class="ncm-mini-label">Créd. Outorgado</span><span class="ncm-mini-val">${info.mvaOutorgado}%</span></div>
                    <div class="ncm-mini-box"><span class="ncm-mini-label">Atacadista</span><span class="ncm-mini-val">${info.mvaAtacadista}%</span></div>
                    <div class="ncm-mini-box" style="border-color:var(--accent); background:var(--accent-bg);"><span class="ncm-mini-label" style="color:var(--accent);">Demais (Cálculo)</span><span class="ncm-mini-val" style="color:var(--accent);">${info.mvaDemais}%</span></div>
                </div>
            `;
            box.style.display = 'block';
        } else {
            box.innerHTML = `<span style="color:var(--danger)">NCM não cadastrado na base de dados local.</span>`;
            box.style.display = 'block';
        }
    }

    function distribuirValores(text) {
        if (!text) return;
        const partes = text.split(/[\t\s]{2,}/).filter(p => p.trim() !== "");
        if (partes.length >= 3) {
            document.getElementById('ncm').value = partes[0].trim();
            document.getElementById('vlr').value = partes[1].trim();
            document.getElementById('ipi').value = partes[2].trim();
        } else {
            document.activeElement.value = text.trim();
        }
    }

    const dropZone = document.getElementById('drop-zone');
    const xmlInput = document.getElementById('xml-input');

    dropZone.onclick = () => xmlInput.click();
    xmlInput.onchange = (e) => processarArquivoXML(e.target.files[0]);

    dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('dragover'); };
    dropZone.ondragleave = () => { dropZone.classList.remove('dragover'); };
    dropZone.ondrop = (e) => { e.preventDefault(); dropZone.classList.remove('dragover'); processarArquivoXML(e.dataTransfer.files[0]); };

    function processarArquivoXML(file) {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(e.target.result, "text/xml");
            
            const icmsTotNode = xmlDoc.getElementsByTagName("ICMSTot")[0];
            if (icmsTotNode) {
                const vSTNota = parseFloat(icmsTotNode.getElementsByTagName("vST")[0]?.textContent || 0);
                if(vSTNota > 0) {
                    document.getElementById('vlrStNota').value = vSTNota.toLocaleString('pt-BR', {minimumFractionDigits:2});
                }
            }

            const itens = xmlDoc.getElementsByTagName("det");
            let importados = 0;
            for (let i = 0; i < itens.length; i++) {
                const item = itens[i];
                const ncm = item.getElementsByTagName("NCM")[0]?.textContent || "";
                const vProd = parseFloat(item.getElementsByTagName("vProd")[0]?.textContent || 0);
                const vIpi = parseFloat(item.getElementsByTagName("vIPI")[0]?.textContent || 0);
                
                const pIcmsNodes = item.getElementsByTagName("pICMS");
                let aliqItem = aliqAtiva; 
                if (pIcmsNodes.length > 0) {
                    const pIcmsVal = parseFloat(pIcmsNodes[0].textContent);
                    if (pIcmsVal === 12) aliqItem = 0.07;
                    else if (pIcmsVal > 0) aliqItem = pIcmsVal / 100;
                }
                
                if (ncm && vProd > 0) {
                    executarCalculoInterno(ncm, vProd, isNaN(vIpi) ? 0 : vIpi, aliqItem, 'xml');
                    importados++;
                }
            }
            xmlInput.value = '';
        };
        reader.readAsText(file);
    }

    function toggleTema() {
        const doc = document.documentElement;
        const btn = document.getElementById('btnTema');
        if (doc.getAttribute('data-theme') === 'light') {
            doc.removeAttribute('data-theme');
            btn.innerText = "Claro";
        } else {
            doc.setAttribute('data-theme', 'light');
            btn.innerText = "Escuro";
        }
    }

    function setAliq(v) {
        aliqAtiva = v;
        document.getElementById('a4').classList.toggle('active', v === 0.04);
        document.getElementById('a7').classList.toggle('active', v === 0.07);
        
        if (historico.length > 0) {
            historico = historico.map(item => {
                if (item.origem === 'manual') {
                    item.aliq = aliqAtiva;
                    if (item.mva > 0) {
                        item.stFinal = Number(((item.baseST * 0.17) - ((item.vProd * item.aliq) * item.fator)).toFixed(2));
                    }
                }
                return item;
            });
            atualizarTabela();
        }
    }

    function processarManual() {
        const ncm = document.getElementById('ncm').value.trim();
        const vProd = limparNum(document.getElementById('vlr').value);
        const vIpi = limparNum(document.getElementById('ipi').value);
        if (!ncm) return;
        executarCalculoInterno(ncm, vProd, vIpi, aliqAtiva, 'manual');
        document.getElementById('ncm').value = '';
        document.getElementById('vlr').value = '';
        document.getElementById('ipi').value = '';
    }

    function executarCalculoInterno(ncm, vProd, vIpi, aliq, origem) {
        const info = dbNcm[ncm] || { mvaCalculo: 0, red: 0 };
        let baseST = 0;
        let stFinal = 0;
        let mvaParaCalculo = info.mvaCalculo || 0;
        let fator = info.red === 0 ? 1 : info.red;

        if (mvaParaCalculo > 0) {
            baseST = Number(((vProd + vIpi) * (1 + mvaParaCalculo) * fator).toFixed(2));
            stFinal = Number(((baseST * 0.17) - ((vProd * aliq) * fator)).toFixed(2));
        }

        historico.push({ ncm, mva: mvaParaCalculo, vProd, baseST, stFinal, aliq, origem, fator });
        atualizarTabela();
    }

    function limparNum(t) {
        if(!t) return 0;
        return parseFloat(t.toString().replace('R$', '').replace(/\s/g, '').replace(/\./g, '').replace(',', '.')) || 0;
    }

    function limparTudo() {
        historico = [];
        document.getElementById('ncm').value = '';
        document.getElementById('vlr').value = '';
        document.getElementById('ipi').value = '';
        document.getElementById('vlrStNota').value = '';
        document.getElementById('busca-ncm-input').value = '';
        document.getElementById('busca-ncm-resultado').style.display = 'none';
        document.getElementById('resCard').style.display = 'none';
    }

    function removerLinha(index) {
        historico.splice(index, 1);
        if (historico.length === 0) {
            document.getElementById('resCard').style.display = 'none';
        } else {
            atualizarTabela();
        }
    }

    function copiarParaArea(valor, btnElem) {
        const valFormatado = valor.toLocaleString('pt-BR', {minimumFractionDigits: 2});
        navigator.clipboard.writeText(valFormatado).then(() => {
            const iconeOriginal = btnElem.innerHTML;
            btnElem.innerHTML = svgCheck;
            setTimeout(() => { btnElem.innerHTML = iconeOriginal; }, 1000);
        });
    }

    function atualizarTabela() {
        let total = 0;
        let html = '';
        historico.forEach((item, index) => {
            total += item.stFinal;
            const isZero = item.mva === 0;
            
            html += `<tr>
                <td>${item.ncm}</td>
                <td class="${isZero ? 'isento-txt' : ''}">${(item.mva*100).toFixed(2)}%</td>
                <td>R$ ${item.vProd.toLocaleString('pt-BR',{minimumFractionDigits:2})}</td>
                <td>
                    <div class="val-container">
                        <span class="${isZero ? 'isento-txt' : ''}">R$ ${item.baseST.toLocaleString('pt-BR',{minimumFractionDigits:2})}</span>
                        ${!isZero ? `<button class="icon-btn" onclick="copiarParaArea(${item.baseST}, this)">${svgCopy}</button>` : ''}
                    </div>
                </td>
                <td>
                    <div class="val-container">
                        <span class="st-badge" style="${isZero ? 'background: transparent; color: var(--text-sub); border: 1px solid var(--border);' : ''}">
                            R$ ${item.stFinal.toLocaleString('pt-BR',{minimumFractionDigits:2})}
                        </span>
                        ${!isZero ? `<button class="icon-btn" onclick="copiarParaArea(${item.stFinal}, this)">${svgCopy}</button>` : ''}
                    </div>
                </td>
                <td style="text-align:center;">
                    <button class="icon-btn delete" onclick="removerLinha(${index})">${svgDel}</button>
                </td>
            </tr>`;
        });
        
        totalCalculadoGlobal = total;
        document.getElementById('corpoTabela').innerHTML = html;
        document.getElementById('totalSt').innerText = `R$ ${total.toLocaleString('pt-BR',{minimumFractionDigits:2})}`;
        document.getElementById('resCard').style.display = 'block';

        verificarAuditoriaST();
    }

    function verificarAuditoriaST() {
        let stNota = limparNum(document.getElementById('vlrStNota').value);
        let boxCredito = document.getElementById('boxCredito');
        let txtCredito = document.getElementById('txtCredito');

        if (stNota === 0 || historico.length === 0) {
            boxCredito.style.display = 'none';
            return;
        }

        let diferenca = stNota - totalCalculadoGlobal;

        if (diferenca > 0.01) {
            // Nota cobrou a mais do que o cálculo da ferramenta -> Gera Crédito
            boxCredito.style.display = 'flex';
            txtCredito.className = "auditoria-badge credito";
            txtCredito.innerHTML = `IMPOSTO RECOLHIDO A MAIS (R$ ${diferenca.toLocaleString('pt-BR', {minimumFractionDigits:2})})`;
        } else if (diferenca < -0.01) {
            // Nota cobrou a menos do que o cálculo real -> Falta pagar complemento
            boxCredito.style.display = 'flex';
            txtCredito.className = "auditoria-badge recolher";
            txtCredito.innerHTML = `IMPOSTO A RECOLHER (R$ ${Math.abs(diferenca).toLocaleString('pt-BR', {minimumFractionDigits:2})})`;
        } else {
            boxCredito.style.display = 'none';
        }
    }
</script>
</body>
</html>
