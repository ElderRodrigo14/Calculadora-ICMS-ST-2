<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora ICMS-ST Smart</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #131314;
            --card-dark: #1e1f20;
            --text-main: #e3e3e3;
            --text-sub: #b3b3b3;
            --accent: #4285f4;
            --border: #3c4043;
            --input-bg: #131314;
        }

        body {
            font-family: 'Google Sans', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container { width: 100%; max-width: 850px; }

        h1 {
            font-size: 24px;
            font-weight: 400;
            margin-bottom: 25px;
            background: linear-gradient(90deg, #4285f4, #9b72cb, #d96570);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card {
            background: var(--card-dark);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1.2fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .field { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 13px; color: var(--text-sub); }

        input {
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px;
            color: var(--text-main);
            font-size: 15px;
            outline: none;
            transition: 0.2s;
        }

        input:focus { border-color: var(--accent); background: #1a1a1c; }

        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn-aliq {
            flex: 1; padding: 12px;
            background: transparent; border: 1px solid var(--border);
            border-radius: 50px; color: var(--text-main); cursor: pointer;
        }

        .btn-aliq.active {
            background: rgba(66, 133, 244, 0.2);
            border-color: var(--accent);
            color: #8ab4f8;
        }

        .btn-main {
            width: 100%; padding: 16px;
            background: var(--accent); color: #000;
            border: none; border-radius: 50px;
            font-size: 16px; font-weight: 500; cursor: pointer;
        }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; color: var(--text-sub); font-size: 11px; padding: 10px; border-bottom: 1px solid var(--border); }
        td { padding: 12px 10px; border-bottom: 1px solid var(--border); font-size: 13px; }

        .st-badge {
            background: rgba(129, 201, 149, 0.15);
            color: #81c995;
            padding: 6px 10px;
            border-radius: 8px;
            font-weight: 500;
        }

        .total-box {
            margin-top: 20px; padding: 20px;
            background: rgba(138, 180, 248, 0.1);
            border-radius: 15px; text-align: right;
            font-size: 26px; color: #8ab4f8;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Calculadora de ICMS-ST Smart</h1>
    
    <div class="card">
        <div class="grid">
            <div class="field">
                <label>NCM (Clique para auto-colar)</label>
                <input type="text" id="ncm" placeholder="Clique aqui ou dê Ctrl+V">
            </div>
            <div class="field"><label>Valor dos Produtos</label><input type="text" id="vlr" placeholder="0,00"></div>
            <div class="field"><label>Valor IPI</label><input type="text" id="ipi" placeholder="0,00"></div>
        </div>

        <div class="btn-group">
            <button class="btn-aliq active" id="a4" onclick="setAliq(0.04)">4%</button>
            <button class="btn-aliq" id="a7" onclick="setAliq(0.07)">7%</button>
        </div>

        <button class="btn-main" onclick="processar()">Calcular e Adicionar</button>
    </div>

    <div id="resCard" class="card" style="display:none;">
        <table id="tabela">
            <thead>
                <tr>
                    <th>NCM</th>
                    <th>MVA</th>
                    <th>PRODUTOS</th>
                    <th>BASE ST</th>
                    <th>ICMS ST</th>
                </tr>
            </thead>
            <tbody id="corpoTabela"></tbody>
        </table>
        <div class="total-box" id="totalSt">Total ST: R$ 0,00</div>
    </div>
</div>

<script>
    let dbNcm = {};
    let aliqAtiva = 0.04;
    let historico = [];

    // Carregar CSV
    async function init() {
        try {
            const r = await fetch('BASE NCM.csv');
            if (r.ok) {
                const txt = await r.text();
                txt.split(/\r?\n/).forEach((linha, i) => {
                    if(i === 0 || !linha.trim()) return;
                    const col = linha.split(';');
                    dbNcm[col[0].trim()] = {
                        mva: parseFloat(col[1]?.replace('%','').replace(',','.')) / 100 || 0,
                        red: parseFloat(col[3]?.replace('%','').replace(',','.')) / 100 || 0
                    };
                });
            }
        } catch (e) { console.warn("Modo sem CSV ativado."); }
    }

    // AUTO-PASTE NO CLIQUE COM DIAGNÓSTICO
    document.getElementById('ncm').addEventListener('click', async function() {
        // Verifica se o navegador bloqueou o recurso por não ser HTTPS
        if (!navigator.clipboard || !navigator.clipboard.readText) {
            console.warn("Auto-colar bloqueado pelo navegador (necessário HTTPS). Use Ctrl+V.");
            return;
        }
        
        try {
            const text = await navigator.clipboard.readText();
            if (text) {
                const partes = text.split(/[\t\s]{2,}/).filter(p => p.trim() !== "");
                
                if (partes.length >= 3) {
                    document.getElementById('ncm').value = partes[0].trim();
                    document.getElementById('vlr').value = partes[1].trim();
                    document.getElementById('ipi').value = partes[2].trim();
                } else {
                    document.getElementById('ncm').value = text.trim();
                }
            }
        } catch (err) { 
            console.error("Permissão negada ou erro ao ler a área de transferência:", err);
            alert("Não foi possível colar automaticamente. Por favor, dê Ctrl+V.");
        }
    });

    // AUTO-PASTE SE O USUÁRIO APERTAR CTRL+V (Plano B)
    document.getElementById('ncm').addEventListener('paste', function(e) {
        const text = e.clipboardData.getData('text');
        if (text && (text.includes('\t') || text.split(/\s{2,}/).length > 1)) {
            e.preventDefault();
            const partes = text.split(/[\t\s]{2,}/).filter(p => p.trim() !== "");
            if (partes.length >= 1) document.getElementById('ncm').value = partes[0].trim();
            if (partes.length >= 2) document.getElementById('vlr').value = partes[1].trim();
            if (partes.length >= 3) document.getElementById('ipi').value = partes[2].trim();
        }
    });

    function setAliq(v) {
        aliqAtiva = v;
        document.getElementById('a4').classList.toggle('active', v === 0.04);
        document.getElementById('a7').classList.toggle('active', v === 0.07);
    }

    function limparNum(t) {
        if(!t) return 0;
        let n = t.toString().replace('R$', '').replace(/\s/g, '').replace(/\./g, '').replace(',', '.');
        return parseFloat(n) || 0;
    }

    function processar() {
        const ncm = document.getElementById('ncm').value.trim();
        const vProd = limparNum(document.getElementById('vlr').value);
        const vIpi = limparNum(document.getElementById('ipi').value);
        const info = dbNcm[ncm] || { mva: 0, red: 0 };

        let fator = info.red === 0 ? 1 : info.red;
        
        // Mantendo 2 casas decimais e sua fórmula
        let baseST = Number(((vProd + vIpi) * (1 + info.mva) * fator).toFixed(2));
        let stFinal = Number(((baseST * 0.17) - ((vProd * aliqAtiva) * fator)).toFixed(2));

        historico.push({ ncm, mva: info.mva, vProd, baseST, stFinal });
        
        let total = 0;
        let html = '';
        historico.forEach(item => {
            total += item.stFinal;
            html += `<tr>
                <td>${item.ncm}</td>
                <td>${(item.mva*100).toFixed(2)}%</td>
                <td>R$ ${item.vProd.toLocaleString('pt-BR',{minimumFractionDigits:2})}</td>
                <td>R$ ${item.baseST.toLocaleString('pt-BR',{minimumFractionDigits:2})}</td>
                <td><span class="st-badge">R$ ${item.stFinal.toLocaleString('pt-BR',{minimumFractionDigits:2})}</span></td>
            </tr>`;
        });
        
        document.getElementById('corpoTabela').innerHTML = html;
        document.getElementById('totalSt').innerText = `Total ST: R$ ${total.toLocaleString('pt-BR',{minimumFractionDigits:2})}`;
        document.getElementById('resCard').style.display = 'block';
    }

    init();
</script>

</body>
</html>
