<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Fiscal Inteligente</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&family=Roboto+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a73e8;
            --surface: #ffffff;
            --background: #f8f9fa;
            --text-primary: #1f1f1f;
            --text-secondary: #70757a;
            --accent-green: #188038;
        }

        body {
            font-family: 'Google Sans', sans-serif;
            background-color: var(--background);
            color: var(--text-primary);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1000px;
        }

        .gemini-header {
            text-align: left;
            margin-bottom: 30px;
        }

        .gemini-header h1 {
            font-size: 32px;
            font-weight: 500;
            background: linear-gradient(90deg, #4285f4, #9b72cb, #d96570);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        .card {
            background: var(--surface);
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 1px 3px rgba(60,64,67,0.3), 0 4px 8px 3px rgba(60,64,67,0.15);
            margin-bottom: 24px;
            border: 1px solid #e0e0e0;
        }

        .input-wrapper {
            position: relative;
        }

        textarea {
            width: 100%;
            height: 180px;
            border: 1px solid #dadce0;
            border-radius: 16px;
            padding: 20px;
            font-size: 16px;
            font-family: 'Roboto Mono', monospace;
            resize: none;
            box-sizing: border-box;
            background-color: #fff;
            transition: all 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: #4285f4;
            box-shadow: 0 0 0 4px rgba(66,133,244,0.1);
        }

        .button-bar {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        button {
            padding: 12px 28px;
            border-radius: 100px;
            border: none;
            font-family: 'Google Sans', sans-serif;
            font-weight: 500;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
        }

        .btn-primary:hover { background-color: #1765cc; }

        .btn-secondary {
            background-color: transparent;
            border: 1px solid #dadce0;
            color: var(--primary);
        }

        .btn-secondary:hover { background-color: #f8f9fa; }

        .result-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .result-table th {
            text-align: left;
            padding: 16px;
            font-size: 12px;
            color: var(--text-secondary);
            border-bottom: 1px solid #e0e0e0;
            text-transform: uppercase;
        }

        .result-table td {
            padding: 16px;
            font-size: 15px;
            border-bottom: 1px solid #f1f3f4;
        }

        .badge-st {
            background: #e6f4ea;
            color: #137333;
            padding: 6px 12px;
            border-radius: 8px;
            font-weight: 500;
        }

        .total-container {
            margin-top: 30px;
            padding: 24px;
            background: linear-gradient(135deg, #e8f0fe 0%, #d2e3fc 100%);
            border-radius: 20px;
            text-align: right;
            border: 1px solid #aecbfa;
        }

        .total-label { font-size: 14px; color: #1967d2; margin-bottom: 4px; }
        .total-value { font-size: 28px; font-weight: 500; color: #185abc; }

        .hint-text { font-size: 12px; color: var(--text-secondary); margin-top: 12px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="gemini-header">
            <h1>Calculadora de Antecipação</h1>
        </div>

        <div class="card">
            <div class="input-wrapper">
                <textarea id="inputText" placeholder="Clique para colar dados do Excel (NCM | Valor | IPI)" onclick="colarSempre()"></textarea>
            </div>
            <p class="hint-text">✨ Clique no campo para adicionar novos itens sem apagar os atuais.</p>
            <div class="button-bar">
                <button class="btn-primary" onclick="processar()">Calcular Agora</button>
                <button class="btn-secondary" onclick="resetar()">Limpar Tudo</button>
            </div>
        </div>

        <div id="outputCard" class="card" style="display:none; padding: 0 0 32px 0;">
            <div style="padding: 32px 32px 0 32px;">
                <h3 style="margin: 0 0 20px 0; font-weight: 500;">Resultados do Lote</h3>
                <div id="tableArea"></div>
            </div>
            <div style="padding: 0 32px;">
                <div class="total-container">
                    <div class="total-label">Valor Total ICMS-ST</div>
                    <div class="total-value" id="grandTotal">R$ 0,00</div>
                </div>
            </div>
        </div>
    </div>

        async function colarSempre() {
            try {
                const text = await navigator.clipboard.readText();
                const area = document.getElementById('inputText');
                if (text && !area.value.includes(text)) {
                    area.value = area.value.trim() ? area.value + "\n" + text : text;
                }
            } catch (e) { console.log("Permissão para área de transferência necessária."); }
        }
