<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora ICMS-ST Smart</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #131314;
            --card-dark: #1e1f20;
            --text-main: #e3e3e3;
            --text-sub: #b3b3b3;
            --accent: #4285f4;
            --border: #3c4043;
            --input-bg: #131314;
        }

        body {
            font-family: 'Google Sans', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container { width: 100%; max-width: 850px; }

        h1 {
            font-size: 24px;
            font-weight: 400;
            margin-bottom: 25px;
            background: linear-gradient(90deg, #4285f4, #9b72cb, #d96570);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card {
            background: var(--card-dark);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1.2fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .field { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 13px; color: var(--text-sub); }

        input {
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px;
            color: var(--text-main);
            font-size: 15px;
            outline: none;
            transition: 0.2s;
            cursor: pointer;
        }

        input:focus { border-color: var(--accent); background: #1a1a1c; }

        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn-aliq {
            flex: 1; padding: 12px;
            background: transparent; border: 1px solid var(--border);
            border-radius: 50px; color: var(--text-main); cursor: pointer;
        }

        .btn-aliq.active {
            background: rgba(66, 133, 244, 0.2);
            border-color: var(--accent);
            color: #8ab4f8;
        }

        .btn-main {
            width: 100%; padding: 16px;
            background: var(--accent); color: #000;
            border: none; border-radius: 50px;
            font-size: 16px; font-weight: 500; cursor: pointer;
        }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
