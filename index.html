    <style>
        :root {
            --bg: #131314;
            --card-bg: #1e1f20;
            --text-main: #e3e3e3;
            --text-sub: #b3b3b3;
            --accent: #4285f4;
            --border: #3c4043;
            --input-bg: #131314;
            --btn-hover: #1a1a1c;
            --danger: #f28b82;
            --success: #81c995;
        }

        [data-theme="light"] {
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --text-main: #202124;
            --text-sub: #5f6368;
            --accent: #1a73e8;
            --border: #dadce0;
            --input-bg: #f8f9fa;
            --btn-hover: #e8eaed;
            --danger: #d93025;
            --success: #137333;
        }

        body {
            font-family: 'Google Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            transition: 0.3s;
        }

        .container { width: 100%; max-width: 900px; }

        .header { display: flex; justify-content: center; align-items: center; margin-bottom: 25px; position: relative; }
        h1 { font-size: 26px; font-weight: 500; margin: 0; background: linear-gradient(90deg, #4285f4, #9b72cb, #d96570); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .btn-theme:hover { background: var(--input-bg); }

        .card { background: var(--card-bg); border-radius: 20px; padding: 25px; border: 1px solid var(--border); margin-bottom: 20px; transition: 0.3s; }
