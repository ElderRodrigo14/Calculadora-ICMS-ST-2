<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Fiscal | ICMS-ST</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --gemini-blue: #1a73e8;
            --gemini-gradient: linear-gradient(90deg, #4285f4, #9b72cb, #d96570);
            --bg: #f0f2f5;
        }

        body {
            font-family: 'Google Sans', sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .container { width: 100%; max-width: 900px; }

        .header h1 {
            background: var(--gemini-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 32px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            margin-bottom: 24px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        textarea {
            width: 100%;
            height: 120px;
            border: 1px solid #dadce0;
            border-radius: 16px;
            padding: 20px;
            font-size: 16px;
            resize: none;
            transition: 0.3s;
            background: #f8f9fa;
        }

        textarea:focus {
            outline: none;
            border-color: #4285f4;
            background: white;
            box-shadow: 0 0 0 4px rgba(66,133,244,0.1);
        }

        .actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        button {
            padding: 12px 28px;
            border-radius: 100px;
            border: none;
            cursor: pointer;
            font-weight: 500;
            font-family: 'Google Sans';
            transition: 0.2s;
        }

        .btn-calc { background: var(--gemini-blue); color: white; font-size: 16px; }
        .btn-calc:hover { opacity: 0.9; transform: translateY(-1px); }

        .btn-clear { background: #f1f3f4; color: #3c4043; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; color: #70757a; font-size: 12px; padding: 16px; border-bottom: 1px solid #e0e0e0; }
        td { padding: 16px; border-bottom: 1px solid #f1f3f4; font-size: 14px; }

        .st-highlight {
            color: #188038;
            font-weight: 500;
            background: #e6f4ea;
            padding: 6px 12px;
            border-radius: 8px;
        }

        .total-card {
            background: linear-gradient(135deg, #e8f0fe 0%, #d2e3fc 100%);
            border-radius: 20px;
            padding: 24px;
            text-align: right;
            margin-top: 20px;
        }

        .total-val { font-size: 32px; font-weight: 500; color: #174ea6; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Calculadora Fiscal</h1>
    </div>

    <div class="card">
        <div class="input-group">
            <label style="font-weight: 500; color: #444;">Área de entrada (Cole aqui)</label>
            <textarea id="mainInput" placeholder="NCM | VALOR | IPI" onclick="colarEAdicionar()"></textarea>
        </div>
        <div class="actions">
            <button class="btn-calc" onclick="processar()">Calcular Tudo</button>
            <button class="btn-clear" onclick="limpar()">Limpar</button>
        </div>
    </div>

    <div id="resultCard" class="card" style="display:none;">
        <h3 style="margin-top:0">Resultados do Processamento</h3>
        <div id="tableOutput"></div>
        <div class="total-card">
            <div style="font-size: 14px; color: #1967d2;">Total ICMS-ST a Recolher</div>
            <div id="grandTotal" class="total-val">R$ 0,00</div>
        </div>
    </div>
</div>

<script>
    let ncmMap = {};

    // CARREGA O CSV QUE VOCÊ SUBIU NO GITHUB
    fetch('BASE NCM.csv')
        .then(response => response.text())
        .then(data => {
            const rows = data.split('\n');
            rows.forEach(row => {
                const cols = row.split(';');
                if(cols[0]) {
                    // Limpa o MVA (ex: "40,33%" vira 0.4033)
                    let mvaRaw = cols[1] ? cols[1].replace('%', '').replace(',', '.') : "40.33";
                    ncmMap[cols[0].trim()] = parseFloat(mvaRaw) / 100;
                }
            });
            console.log("Base carregada!");
        });

    async function colarEAdicionar() {
        try {
            const text = await navigator.clipboard.readText();
            const area = document.getElementById('mainInput');
            if (text && !area.value.includes(text)) {
                area.value = area.value ? area.value + "\n" + text : text;
            }
        } catch (e) {}
    }

    function processar() {
        const input = document.getElementById('mainInput').value.trim();
        if(!input) return;

        const lines = input.split('\n');
        let totalST = 0;
        let html = `<table><thead><tr><th>NCM</th><th>MVA %</th><th>Vlr Prod</th><th>IPI</th><th>Base ST</th><th>ICMS-ST</th></tr></thead><tbody>`;

        lines.forEach(line => {
            const p = line.split(/[\s\t|]+/).filter(x => x.trim() !== "");
            if(p.length >= 2) {
                const ncm = p[0].replace(/\D/g, "");
                const vlrProd = parseFloat(p[1].replace(',', '.')) || 0;
                const vlrIpi = parseFloat(p[2]?.replace(',', '.')) || 0;
                
                // MVA da base ou padrão
                const mva = ncmMap[ncm] || 0.4033;

                // FÓRMULAS DAS IMAGENS
                const baseST = (vlrProd + vlrIpi) * (1 + mva);
                let stFinal = (baseST * 0.18) - (vlrProd * 0.12);
                if(stFinal < 0) stFinal = 0;

                totalST += stFinal;

                html += `<tr>
                    <td><b>${ncm}</b></td>
                    <td>${(mva*100).toFixed(2)}%</td>
                    <td>R$ ${vlrProd.toFixed(2)}</td>
                    <td>R$ ${vlrIpi.toFixed(2)}</td>
                    <td>R$ ${baseST.toFixed(2)}</td>
                    <td><span class="st-highlight">R$ ${stFinal.toFixed(2)}</span></td>
                </tr>`;
            }
        });

        html += "</tbody></table>";
        document.getElementById('tableOutput').innerHTML = html;
        document.getElementById('grandTotal').innerText = `R$ ${totalST.toLocaleString('pt-BR', {minimumFractionDigits:2})}`;
        document.getElementById('resultCard').style.display = 'block';
    }

    function limpar() {
        document.getElementById('mainInput').value = "";
        document.getElementById('resultCard').style.display = 'none';
    }
</script>

</body>
</html>
