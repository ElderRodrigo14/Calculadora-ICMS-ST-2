<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora ICMS-ST Pro</title>
    <style>
        body { font-family: sans-serif; background: #f8f9fa; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
        textarea { width: 100%; height: 180px; border: 2px dashed #007bff; border-radius: 6px; padding: 15px; font-family: monospace; box-sizing: border-box; cursor: pointer; }
        textarea:focus { border-style: solid; background: #f0f7ff; outline: none; }
        .btn-calc { background: #28a745; color: white; border: none; padding: 15px; width: 100%; font-size: 18px; font-weight: bold; border-radius: 4px; cursor: pointer; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #343a40; color: white; padding: 12px; font-size: 12px; }
        td { border: 1px solid #dee2e6; padding: 10px; text-align: center; font-size: 13px; }
        .res-destaque { color: #d9534f; font-weight: bold; }
        .total { background: #fff3cd; padding: 15px; text-align: right; font-size: 20px; font-weight: bold; margin-top: 10px; border-radius: 4px; border: 1px solid #ffeeba; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2 style="margin-top:0; color:#0056b3;">Calculadora de Lote ICMS-ST</h2>
            <p style="color:#666; font-size: 13px;">Clique no campo abaixo para colar automaticamente os dados copiados.</p>
            <textarea id="inputText" placeholder="Clique aqui para colar: NCM | VALOR | IPI" onclick="colarAuto()"></textarea>
            <button class="btn-calc" onclick="calcular()">CALCULAR AGORA</button>
        </div>
        <div id="resultado" class="card" style="display:none;"></div>
    </div>

    <script>
        // Carrega a base do seu CSV (exemplo com os dados que você enviou)
        const baseMVA = {
            "85365090": 63.28, "85369040": 63.28, "85389010": 63.28, "85447010": 63.28,
            "84818019": 43.14, "84818099": 43.14, "73181500": 54.12, "73181600": 54.12
            // O sistema buscará o NCM puro (apenas números)
        };

        // FUNÇÃO DE COLAR AUTOMÁTICO
        async function colarAuto() {
            try {
                const text = await navigator.clipboard.readText();
                if (text) document.getElementById('inputText').value = text;
            } catch (err) {
                console.log("Permissão de colar negada ou não suportada.");
            }
        }

        function calcular() {
            const input = document.getElementById('inputText').value.trim();
            if (!input) return;

            const linhas = input.split('\n');
            let totalST = 0;
            let html = '<table><thead><tr><th>NCM</th><th>MVA %</th><th>Vlr Prod</th><th>IPI</th><th>Base ST</th><th>ICMS ST Final</th></tr></thead><tbody>';

            linhas.forEach(linha => {
                // SEPARADOR: Espaço, Tab ou Pipe "|"
                const partes = linha.split(/[\s\t|]+/).filter(p => p.trim() !== "");
                
                if (partes.length >= 2) {
                    const ncm = partes[0].replace(/\D/g, "");
                    const valor = parseFloat(partes[1].replace(',', '.')) || 0;
                    const ipi = parseFloat(partes[2]?.replace(',', '.')) || 0;
                    
                    const mva = (baseMVA[ncm] || 40) / 100; // Padrão 40% se não achar

                    // --- MATEMÁTICA CONFORME PRINTS ---
                    // 1. Base ST = (Valor + IPI) * (1 + MVA)
                    const baseST = (valor + ipi) * (1 + mva);
                    
                    // 2. ST Final = (Base ST * 0.18) - (Valor * 0.12)
                    let stFinal = (baseST * 0.18) - (valor * 0.12);
                    if (stFinal < 0) stFinal = 0;

                    totalST += stFinal;

                    html += `<tr>
                        <td>${ncm}</td>
                        <td>${(mva*100).toFixed(2)}%</td>
                        <td>R$ ${valor.toFixed(2)}</td>
                        <td>R$ ${ipi.toFixed(2)}</td>
                        <td>R$ ${baseST.toFixed(2)}</td>
                        <td class="res-destaque">R$ ${stFinal.toFixed(2)}</td>
                    </tr>`;
                }
            });

            html += `</tbody></table><div class="total">TOTAL LOTE: R$ ${totalST.toFixed(2)}</div>`;
            const resDiv = document.getElementById('resultado');
            resDiv.innerHTML = html;
            resDiv.style.display = 'block';
        }
    </script>
</body>
</html>
