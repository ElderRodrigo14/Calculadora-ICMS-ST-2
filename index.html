<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora ICMS-ST Smart Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #131314;
            --card-dark: #1e1f20;
            --text-main: #e3e3e3;
            --text-sub: #b3b3b3;
            --accent: #4285f4;
            --border: #3c4043;
            --input-bg: #131314;
        }

        body {
            font-family: 'Google Sans', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container { width: 100%; max-width: 900px; }

        h1 {
            font-size: 28px;
            font-weight: 400;
            margin-bottom: 30px;
            background: linear-gradient(90deg, #4285f4, #9b72cb, #d96570);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card {
            background: var(--card-dark);
            border-radius: 24px;
            padding: 30px;
            border: 1px solid var(--border);
            margin-bottom: 24px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1.2fr 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }

        .field { display: flex; flex-direction: column; gap: 8px; }

        label { font-size: 14px; color: var(--text-sub); margin-left: 4px; }

        input {
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
            color: var(--text-main);
            font-size: 16px;
            outline: none;
            cursor: pointer;
        }

        input:focus { border-color: var(--accent); background: #1a1a1c; }

        .btn-group { display: flex; gap: 12px; margin-bottom: 24px; }

        .btn-aliq {
            flex: 1;
            padding: 12px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 100px;
            color: var(--text-main);
            cursor: pointer;
        }

        .btn-aliq.active {
            background: rgba(66, 133, 244, 0.15);
            border-color: var(--accent);
