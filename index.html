<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora ICMS-ST Smart</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #131314;
            --card-bg: #1e1f20;
            --text-main: #e3e3e3;
            --text-sub: #b3b3b3;
            --accent: #4285f4;
            --border: #3c4043;
            --input-bg: #131314;
            --btn-hover: #1a1a1c;
            --danger: #f28b82;
            --success: #81c995;
            --warning: #fdd663;
        }

        [data-theme="light"] {
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --text-main: #202124;
            --text-sub: #5f6368;
            --accent: #1a73e8;
            --border: #dadce0;
            --input-bg: #f8f9fa;
            --btn-hover: #e8eaed;
            --danger: #d93025;
            --success: #137333;
            --warning: #f9ab00;
        }

        body { font-family: 'Google Sans', sans-serif; background-color: var(--bg); color: var(--text-main); margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh; transition: 0.3s; }
        .container { width: 100%; max-width: 900px; }

        .header { display: flex; justify-content: center; align-items: center; margin-bottom: 25px; position: relative; }
        h1 { font-size: 26px; font-weight: 500; margin: 0; background: linear-gradient(90deg, #4285f4, #9b72cb, #d96570); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .btn-theme { position: absolute; right: 0; background: var(--card-bg); border: 1px solid var(--border); color: var(--text-main); padding: 8px 12px; border-radius: 50px; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: 0.2s; }
        .btn-theme:hover { background: var(--input-bg); }

        .card { background: var(--card-bg); border-radius: 20px; padding: 25px; border: 1px solid var(--border); margin-bottom: 20px; transition: 0.3s; }

        .drop-zone { border: 2px dashed var(--border); border-radius: 15px; padding: 25px; text-align: center; margin-bottom: 20px; cursor: pointer; color: var(--text-sub); transition: 0.2s; background: var(--input-bg); }
        .drop-zone:hover, .drop-zone.dragover { border-color: var(--accent); color: var(--accent); background: rgba(66, 133, 244, 0.05); }

        .grid { display: grid; grid-template-columns: 1.2fr 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .field { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 13px; color: var(--text-sub); }

        input[type="text"] { background: var(--input-bg); border: 1px solid var(--border); border-radius: 10px; padding: 14px; color: var(--text-main); font-size: 15px; outline: none; transition: 0.2s; cursor: text; }
        input[type="text"]:focus { border-color: var(--accent); background: var(--btn-hover); }

        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn-aliq { flex: 1; padding: 12px; background: transparent; border: 1px solid var(--border); border-radius: 50px; color: var(--text-main); cursor: pointer; transition: 0.2s; }
        .btn-aliq.active { background: rgba(66, 133, 244, 0.15); border-color: var(--accent); color: var(--accent); font-weight: 500; }

        .action-group { display: flex; gap: 10px; }
        .btn-main { flex: 2; padding: 16px; background: var(--accent); color: #fff; border: none; border-radius: 50px; font-size: 16px; font-weight: 500; cursor: pointer; transition: 0.2s; }
        .btn-main:hover { opacity: 0.9; }
        .btn-clear { flex: 1; padding: 16px; background: transparent; color: var(--text-main); border: 1px solid var(--border); border-radius: 50px; font-size: 16px; cursor: pointer; transition: 0.2s; }
        .btn-clear:hover { background: var(--input-bg); border-color: var(--danger); color: var(--danger); }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; color: var(--text-sub); font-size: 11px; padding: 10px; border-bottom: 1px solid var(--border); }
        td { padding: 12px 10px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: middle; }

        .st-badge { background: rgba(129, 201, 149, 0.15); color: var(--success); padding: 6px 10px; border-radius: 8px; font-weight: 500; }
        .val-container { display: flex; align-items: center; gap: 8px; }

        .icon-btn { background: transparent; border: none; color: var(--text-sub); cursor: pointer; padding: 4px; border-radius: 4px; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .icon-btn:hover { background: var(--border); color: var(--text-main); }
        .icon-btn.delete:hover { background: rgba(217, 48, 37, 0.1); color: var(--danger); }

        .total-wrapper { background: rgba(66, 133, 244, 0.05); border-radius: 15px; padding: 25px; margin-top: 20px; border: 1px solid var(--border); }
        .total-linha { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .total-linha:last-child { margin-bottom: 0; }
        
        .credito-badge { 
            background: rgba(249, 171, 0, 0.15); 
            color: var(--warning); 
            padding: 10px 15px; 
            border-radius: 10px; 
            font-weight: 700; 
            font-size: 15px; 
            display: inline-flex; 
            align-items: center; 
            gap: 8px; 
            border: 1px solid rgba(249, 171, 0, 0.3);
        }

        .total-box { font-size: 26px; color: var(--accent); font-weight: 500; text-align: right; }
        
        svg { fill: currentColor; width: 16px; height: 16px; }
        .isento-txt { color: var(--text-sub); font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Calculadora de ICMS-ST Smart</h1>
        <button class="btn-theme" onclick="toggleTema()" id="btnTema">
            <svg viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/></svg> Claro
        </button>
    </div>
    
    <div class="card">
        <div id="drop-zone" class="drop-zone">
            <svg style="width: 32px; height: 32px; margin-bottom: 8px;" viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zM6 20V4h7v5h5v11H6z"/></svg>
            <p style="margin: 0; font-weight: 500;">Arraste o arquivo XML da NF-e aqui</p>
            <p style="margin: 4px 0 0 0; font-size: 12px; opacity: 0.8;">Ou clique para buscar no computador</p>
            <input type="file" id="xml-input" accept=".xml" style="display: none;">
        </div>

        <div style="text-align: center; color: var(--text-sub); font-size: 12px; margin-bottom: 20px;">— OU PREENCHA MANUALMENTE —</div>

        <div class="grid">
            <div class="field"><label>NCM</label><input type="text" id="ncm" placeholder="Clique para colar"></div>
            <div class="field"><label>Valor Produtos</label><input type="text" id="vlr" placeholder="Clique para colar"></div>
            <div class="field"><label>Valor IPI</label><input type="text" id="ipi" placeholder="Clique para colar"></div>
        </div>

        <div class="field" style="margin-bottom: 20px;">
            <label>Alíquota Interestadual (Para lançamentos manuais)</label>
            <div class="btn-group" style="margin-bottom: 0; margin-top: 8px;">
                <button class="btn-aliq active" id="a4" onclick="setAliq(0.04)">4%</button>
                <button class="btn-aliq" id="a7" onclick="setAliq(0.07)">7%</button>
            </div>
        </div>

        <div class="action-group">
            <button class="btn-main" onclick="processarManual()">Calcular Manual</button>
            <button class="btn-clear" onclick="limparTudo()">Limpar Tudo</button>
        </div>
    </div>

    <div id="resCard" class="card" style="display:none;">
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>NCM</th>
                        <th>MVA</th>
                        <th>PRODUTOS</th>
                        <th>BASE ST</th>
                        <th>ICMS ST</th>
                        <th style="text-align:center;">AÇÃO</th>
                    </tr>
                </thead>
                <tbody id="corpoTabela"></tbody>
            </table>
        </div>
        
        <div class="total-wrapper">
            <div class="total-linha">
                <div style="display: flex; flex-direction: column; gap: 5px;">
                    <label style="font-weight: 500; color: var(--text-main);">ST Destacado na Nota Fiscal (R$):</label>
                    <input type="text" id="vlrStNota" placeholder="0,00" onkeyup="atualizarTabela()" style="width: 180px; padding: 10px; font-size: 16px;">
                </div>
                
                <div style="text-align: right;">
                    <div style="font-size: 14px; color: var(--text-sub); margin-bottom: 5px;">Total Calculado:</div>
                    <div class="total-box" id="totalSt" style="margin: 0; padding: 0; background: none; border: none;">R$ 0,00</div>
                </div>
            </div>
            
            <div class="total-linha" id="boxCredito" style="display: none; justify-content: flex-end; margin-top: 15px;">
                <div class="credito-badge" id="txtCredito">
                    <svg viewBox="0 0 24 24" style="width: 20px; height: 20px;"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
                    IMPOSTO RECOLHIDO A MAIS (R$ 0,00)
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let dbNcm = {};
    let aliqAtiva = 0.04;
    let historico = [];

    const svgCopy = `<svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>`;
    const svgDel = `<svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>`;
    const svgCheck = `<svg viewBox="0 0 24 24" fill="var(--success)"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>`;

    window.onload = function() {
        fetch('BASE NCM.csv').then(r => r.text()).then(txt => {
            txt.split(/\r?\n/).forEach((linha, i) => {
                if(i === 0 || !linha.trim()) return;
                const col = linha.split(';');
                dbNcm[col[0].trim()] = {
                    mva: parseFloat(col[1]?.replace('%','').replace(',','.')) / 100 || 0,
                    red: parseFloat(col[3]?.replace('%','').replace(',','.')) / 100 || 0
                };
            });
        }).catch(e => console.log("Aguardando arquivo CSV..."));

        ['ncm', 'vlr', 'ipi'].forEach(id => {
            const el = document.getElementById(id);
            el.onclick = async function() {
                if (navigator.clipboard && navigator.clipboard.readText) {
                    try { distribuirValores(await navigator.clipboard.readText()); } catch (err) {}
                }
            };
            el.onpaste = function(e) {
                distribuirValores(e.clipboardData.getData('text'));
                e.preventDefault();
            };
        });
    };

    const dropZone = document.getElementById('drop-zone');
    const xmlInput = document.getElementById('xml-input');

    dropZone.onclick = () => xmlInput.click();
    xmlInput.onchange = (e) => processarArquivoXML(e.target.files[0]);

    dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('dragover'); };
    dropZone.ondragleave = () => { dropZone.classList.remove('dragover'); };
    dropZone.ondrop = (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        processarArquivoXML(e.dataTransfer.files[0]);
    };

    function processarArquivoXML(file) {
        if (!file) return;
        if (file.type !== "text/xml" && !file.name.toLowerCase().endsWith('.xml')) {
            alert("Erro: O arquivo precisa ser um XML.");
            return;
        }

        const reader = new FileReader();
        reader.onload = function(e) {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(e.target.result, "text/xml");
            
            // 1. Extrai o Total de ST da Nota Fiscal
            const icmsTotNode = xmlDoc.getElementsByTagName("ICMSTot")[0];
            if (icmsTotNode) {
                const vSTNota = parseFloat(icmsTotNode.getElementsByTagName("vST")[0]?.textContent || 0);
                if(vSTNota > 0) {
                    document.getElementById('vlrStNota').value = vSTNota.toLocaleString('pt-BR', {minimumFractionDigits:2});
                }
            }

            // 2. Extrai os Itens
            const itens = xmlDoc.getElementsByTagName("det");
            if (itens.length === 0) {
                alert("Nenhum produto encontrado neste XML.");
                return;
            }

            let importados = 0;
            for (let i = 0; i < itens.length; i++) {
                const item = itens[i];
                const ncmNode = item.getElementsByTagName("NCM")[0];
                const vProdNode = item.getElementsByTagName("vProd")[0];
                const vIpiNodes = item.getElementsByTagName("vIPI");
                
                const pIcmsNodes = item.getElementsByTagName("pICMS");
                let aliqItem = aliqAtiva; 
                
                if (pIcmsNodes.length > 0) {
                    const pIcmsVal = parseFloat(pIcmsNodes[0].textContent);
                    if (!isNaN(pIcmsVal) && pIcmsVal > 0) {
                        if (pIcmsVal === 12) aliqItem = 0.07;
                        else aliqItem = pIcmsVal / 100;
                    }
                }
                
                const ncm = ncmNode ? ncmNode.textContent : "";
                const vProd = vProdNode ? parseFloat(vProdNode.textContent) : 0;
                let vIpi = 0;
                if (vIpiNodes.length > 0) vIpi = parseFloat(vIpiNodes[0].textContent);

                if (ncm && vProd > 0) {
                    executarCalculoInterno(ncm, vProd, vIpi, aliqItem, 'xml');
                    importados++;
                }
            }
            alert(importados + " produtos importados e calculados com sucesso!");
            xmlInput.value = '';
        };
        reader.readAsText(file);
    }

    function distribuirValores(text) {
        if (!text) return;
        const partes = text.split(/[\t\s]{2,}/).filter(p => p.trim() !== "");
        if (partes.length >= 3) {
            document.getElementById('ncm').value = partes[0].trim();
            document.getElementById('vlr').value = partes[1].trim();
            document.getElementById('ipi').value = partes[2].trim();
        } else {
            document.activeElement.value = text.trim();
        }
    }

    function toggleTema() {
        const doc = document.documentElement;
        const btn = document.getElementById('btnTema');
        if (doc.getAttribute('data-theme') === 'light') {
            doc.removeAttribute('data-theme');
            btn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/></svg> Claro`;
        } else {
            doc.setAttribute('data-theme', 'light');
            btn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41.39.39 1.03.39 1.41 0l1.06-1.06zM7.05 18.36c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41.39.39 1.03.39 1.41 0l1.06-1.06z"/></svg> Escuro`;
        }
    }

    function setAliq(v) {
        aliqAtiva = v;
        document.getElementById('a4').classList.toggle('active', v === 0.04);
        document.getElementById('a7').classList.toggle('active', v === 0.07);
        
        if (historico.length > 0) {
            historico = historico.map(item => {
                if (item.origem === 'manual') {
                    item.aliq = aliqAtiva;
                    if (item.mva > 0) {
                        item.stFinal = Number(((item.baseST * 0.17) - ((item.vProd * item.aliq) * item.fator)).toFixed(2));
                    }
                }
                return item;
            });
            atualizarTabela();
        }
    }

    function limparNum(t) {
        if(!t) return 0;
        let n = t.toString().replace('R$', '').replace(/\s/g, '').replace(/\./g, '').replace(',', '.');
        return parseFloat(n) || 0;
    }

    function processarManual() {
        const ncm = document.getElementById('ncm').value.trim();
        const vProd = limparNum(document.getElementById('vlr').value);
        const vIpi = limparNum(document.getElementById('ipi').value);
        if (!ncm) return;
        executarCalculoInterno(ncm, vProd, vIpi, aliqAtiva, 'manual');
        document.getElementById('ncm').value = '';
        document.getElementById('vlr').value = '';
        document.getElementById('ipi').value = '';
    }

    function executarCalculoInterno(ncm, vProd, vIpi, aliq, origem) {
        const info = dbNcm[ncm] || { mva: 0, red: 0 };
        let baseST = 0;
        let stFinal = 0;
        let fator = info.red === 0 ? 1 : info.red;

        if (info.mva > 0) {
            baseST = Number(((vProd + vIpi) * (1 + info.mva) * fator).toFixed(2));
            stFinal = Number(((baseST * 0.17) - ((vProd * aliq) * fator)).toFixed(2));
        }

        historico.push({ ncm, mva: info.mva, vProd, baseST, stFinal, aliq, origem, fator });
        atualizarTabela();
    }

    function limparTudo() {
        historico = [];
        document.getElementById('ncm').value = '';
        document.getElementById('vlr').value = '';
        document.getElementById('ipi').value = '';
        document.getElementById('vlrStNota').value = '';
        document.getElementById('resCard').style.display = 'none';
    }

    function removerLinha(index) {
        historico.splice(index, 1);
        if (historico.length === 0) {
            document.getElementById('resCard').style.display = 'none';
        } else {
            atualizarTabela();
        }
    }

    function copiarParaArea(valor, btnElem) {
        const valFormatado = valor.toLocaleString('pt-BR', {minimumFractionDigits: 2});
        navigator.clipboard.writeText(valFormatado).then(() => {
            const iconeOriginal = btnElem.innerHTML;
            btnElem.innerHTML = svgCheck;
            setTimeout(() => { btnElem.innerHTML = iconeOriginal; }, 1000);
        });
    }

    function atualizarTabela() {
        let total = 0;
        let html = '';
        historico.forEach((item, index) => {
            total += item.stFinal;
            const isZero = item.mva === 0;
            
            html += `<tr>
                <td>${item.ncm}</td>
                <td class="${isZero ? 'isento-txt' : ''}">${(item.mva*100).toFixed(2)}%</td>
                <td>R$ ${item.vProd.toLocaleString('pt-BR',{minimumFractionDigits:2})}</td>
                <td>
                    <div class="val-container">
                        <span class="${isZero ? 'isento-txt' : ''}">R$ ${item.baseST.toLocaleString('pt-BR',{minimumFractionDigits:2})}</span>
                        ${!isZero ? `<button class="icon-btn" onclick="copiarParaArea(${item.baseST}, this)" title="Copiar Base ST">${svgCopy}</button>` : ''}
                    </div>
                </td>
                <td>
                    <div class="val-container">
                        <span class="st-badge" style="${isZero ? 'background: transparent; color: var(--text-sub); border: 1px solid var(--border);' : ''}">
                            R$ ${item.stFinal.toLocaleString('pt-BR',{minimumFractionDigits:2})}
                        </span>
                        ${!isZero ? `<button class="icon-btn" onclick="copiarParaArea(${item.stFinal}, this)" title="Copiar ICMS ST">${svgCopy}</button>` : ''}
                    </div>
                </td>
                <td style="text-align:center;">
                    <button class="icon-btn delete" onclick="removerLinha(${index})" title="Excluir Linha">${svgDel}</button>
                </td>
            </tr>`;
        });
        
        document.getElementById('corpoTabela').innerHTML = html;
        document.getElementById('totalSt').innerText = `R$ ${total.toLocaleString('pt-BR',{minimumFractionDigits:2})}`;
        document.getElementById('resCard').style.display = 'block';

        // LÓGICA DO ALERTA DE CRÉDITO
        let stNotaStr = document.getElementById('vlrStNota').value;
        let stNota = limparNum(stNotaStr);
        let diferenca = stNota - total;
        
        let boxCredito = document.getElementById('boxCredito');
        let txtCredito = document.getElementById('txtCredito');

        // Se o valor da nota for maior que o calculado (com folga de 1 centavo pra arredondamento)
        if (stNota > 0 && diferenca > 0.01) {
            boxCredito.style.display = 'flex';
            txtCredito.innerHTML = `<svg viewBox="0 0 24 24" style="width: 20px; height: 20px;"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg> IMPOSTO RECOLHIDO A MAIS (CRÉDITO: R$ ${diferenca.toLocaleString('pt-BR', {minimumFractionDigits:2})})`;
        } else {
            boxCredito.style.display = 'none';
        }
    }
</script>
</body>
</html>
