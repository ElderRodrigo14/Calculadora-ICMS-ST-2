<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Fiscal Gemini</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --gemini-blue: #1a73e8;
            --bg: #f8f9fa;
            --border: #dadce0;
        }

        body {
            font-family: 'Google Sans', sans-serif;
            background-color: var(--bg);
            color: #202124;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container { width: 100%; max-width: 850px; }

        h1 {
            background: linear-gradient(90deg, #4285f4, #9b72cb, #d96570);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 28px;
            margin-bottom: 24px;
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 1px 2px rgba(60,64,67,0.3), 0 1px 3px 1px rgba(60,64,67,0.15);
            margin-bottom: 20px;
        }

        .input-row {
            display: grid;
            grid-template-columns: 1.5fr 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }

        .field { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 14px; font-weight: 500; color: #5f6368; }

        input {
            padding: 14px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 16px;
            background: #fff;
        }

        input:focus { border-color: var(--gemini-blue); outline: none; box-shadow: 0 0 0 3px rgba(26,115,232,0.1); }

        .aliq-container { margin-bottom: 24px; }
        .aliq-group { display: flex; gap: 12px; margin-top: 8px; }
        
        .btn-aliq {
            flex: 1;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 100px;
            background: white;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
        }

        .btn-aliq.active {
            background: #e8f0fe;
            border-color: var(--gemini-blue);
            color: var(--gemini-blue);
        }

        .btn-calc {
            width: 100%;
            padding: 16px;
            background: var(--gemini-blue);
            color: white;
            border: none;
            border-radius: 100px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        .btn-calc:hover { background-color: #1765cc; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 16px; font-size: 12px; color: #5f6368; border-bottom: 1px solid var(--border); text-transform: uppercase; }
        td { padding: 16px; border-bottom: 1px solid #f1f3f4; font-size: 14px; }

        .st-badge {
            background: #e6f4ea;
            color: #137333;
            padding: 6px 12px;
            border-radius: 8px;
            font-weight: 500;
        }

        .total-card {
            margin-top: 24px;
            padding: 24px;
            background: #e8f0fe;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .total-label { color: #1967d2; font-weight: 500; }
        .total-value { font-size: 28px; font-weight: 500; color: #174ea6; }
    </style>
</head>
<body>

<div class="container">
    <h1>Substituição Tributária</h1>

    <div class="card">
        <div class="input-row">
            <div class="field">
                <label>NCM</label>
                <input type="text" id="ncm" placeholder="Ex: 84818019">
            </div>
            <div class="field">
                <label>Valor dos Produtos</label>
                <input type="number" id="valor" placeholder="0.00" step="0.01">
            </div>
            <div class="field">
                <label>Valor IPI</label>
                <input type="number" id="ipi" placeholder="0.00" step="0.01">
            </div>
        </div>

        <div class="aliq-container">
            <label>Alíquota Interestadual</label>
            <div class="aliq-group">
                <button class="btn-aliq active" id="aliq4" onclick="setAliq(0.04)">4%</button>
                <button class="btn-aliq" id="aliq7" onclick="setAliq(0.07)">7%</button>
            </div>
        </div>

        <button class="btn-calc" onclick="adicionarItem()">Calcular e Adicionar</button>
    </div>

    <div id="resultCard" class="card" style="display:none;">
        <h3 style="margin-top:0; font-weight: 500;">Itens da Lista</h3>
        <div id="listaItens"></div>
        <div class="total-card">
            <span class="total-label">TOTAL GERAL ST</span>
            <span class="total-value" id="totalGeral">R$ 0,00</span>
        </div>
        <button class="btn-aliq" style="margin-top:20px; width:100%" onclick="limparTudo()">Limpar Tudo</button>
    </div>
</div>

<script>
    let ncmMap = {};
    let aliqInter = 0.04;
    let itens = [];

    // Carregar Base NCM
    fetch('BASE NCM.csv')
        .then(r => r.text())
        .then(data => {
            data.split('\n').forEach(line => {
                const cols = line.split(';');
                if(cols[0]) {
                    let mva = cols[1]?.replace('%', '').replace(',', '.') || "40.33";
                    ncmMap[cols[0].trim()] = parseFloat(mva) / 100;
                }
            });
        });

    function setAliq(v) {
        aliqInter = v;
        document.getElementById('aliq4').className = v === 0.04 ? 'btn-aliq active' : 'btn-aliq';
        document.getElementById('aliq7').className = v === 0.07 ? 'btn-aliq active' : 'btn-aliq';
    }

    function adicionarItem() {
        const ncm = document.getElementById('ncm').value.trim();
        const vlrProd = parseFloat(document.getElementById('valor').value) || 0;
        const vlrIpi = parseFloat(document.getElementById('ipi').value) || 0;

        if(!ncm || vlrProd <= 0) return alert("Preencha NCM e Valor dos Produtos!");

        const mva = ncmMap[ncm] || 0.4033;

        // FÓRMULAS CONFORME SEUS PRINTS
        // 1. Base ST = (Valor Prod + Valor IPI) * (1 + MVA)
        const baseST = (vlrProd + vlrIpi) * (1 + mva);
        
        // 2. ST Final = (Base ST * 18%) - (Valor Prod * Alíquota Selecionada)
        let stFinal = (baseST * 0.18) - (vlrProd * aliqInter);
        if(stFinal < 0) stFinal = 0;

        itens.push({ ncm, mva, vlrProd, vlrIpi, stFinal });
        render();
        
        // Limpar campos e focar no NCM
        document.getElementById('ncm').value = "";
        document.getElementById('valor').value = "";
        document.getElementById('ipi').value = "";
        document.getElementById('ncm').focus();
    }

    function render() {
        let total = 0;
        let html = `<table><thead><tr><th>NCM</th><th>MVA</th><th>Valor Produtos</th><th>IPI</th><th>ICMS-ST</th></tr></thead><tbody>`;

        itens.forEach(i => {
            total += i.stFinal;
            html += `<tr>
                <td><b>${i.ncm}</b></td>
                <td>${(i.mva*100).toFixed(2)}%</td>
                <td>R$ ${i.vlrProd.toFixed(2)}</td>
                <td>R$ ${i.vlrIpi.toFixed(2)}</td>
                <td><span class="st-badge">R$ ${i.stFinal.toFixed(2)}</span></td>
            </tr>`;
        });

        html += "</tbody></table>";
        document.getElementById('listaItens').innerHTML = html;
        document.getElementById('totalGeral').innerText = `R$ ${total.toLocaleString('pt-BR', {minimumFractionDigits:2})}`;
        document.getElementById('resultCard').style.display = 'block';
    }

    function limparTudo() {
        itens = [];
        document.getElementById('resultCard').style.display = 'none';
    }
</script>

</body>
</html>
